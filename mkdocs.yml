site_name: KONJAM
site_url: https://konjam.org
site_description: Learn practical Chennai Tamil through phonetics, flashcards, and street-level scenarios. Survival Tamil for expats, tech workers, and newcomers to Chennai.
site_author: Apoorva
repo_url: https://github.com/apupak/konjam
repo_name: apupak/konjam
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/logo.svg
  favicon: assets/img/favicon.png
  features:
    - navigation.footer
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: blue
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: pink
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Roboto Mono

plugins:
  - search:
      lang: en
  - meta

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

extra:
  generator: false

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/audio.js
  - assets/js/badges.js
  - assets/js/header.js
  - assets/js/lessons.js
  - assets/js/wotd.js
  - assets/js/share.js

nav:
  - Vanakkam: index.md
  - Profile: profile.md
  - Lessons: lessons/index.md
  - Games: games/index.md
  - Flashcards:
      - English to Tamil: flashcards_en_tn.md
      - Tamil to English: flashcards_tn_en.md
