site_name: KONJAM
site_url: https://konjam.org
site_description: Learn practical Chennai Tamil through phonetics, flashcards, and street-level scenarios. Survival Tamil for expats, tech workers, and newcomers to Chennai.
site_author: Apoorva
repo_url: https://github.com/apupak/konjam
repo_name: apupak/konjam
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/favicon.png
  favicon: assets/img/favicon.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
    - navigation.footer
  palette:
    - scheme: slate
      primary: blue
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: pink
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Roboto Mono

plugins:
  - search:
      lang: en
  - meta

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

extra:
  generator: false

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/activity.js
  - assets/js/audio.js
  - assets/js/badges.js
  - assets/js/header.js
  - assets/js/lessons.js
  - assets/js/wotd.js
  - assets/js/share.js

nav:
  - Vanakkam: index.md
  - Profile: profile.md
  - Lessons:
      - 1. History & Nuances: 01_history_and_nuances.md
      - 2. Survival & Emergencies: 02_survival_and_emergencies.md
      - 3. Social Interactions: 03_social_interactions.md
      - 4. Time & Numbers: 04_time_and_numbers.md
      - 5. Verbs & Grammar: 05_verbs_and_grammar.md
      - 6. Adjectives & Limits: 06_adjectives.md
      - 7. Slang & Tanglish: 07_slang.md
  - Games:
      - Meter Podu: games/meter_haaki.md
      - Suffix Station: games/suffix_station.md
      - Adjust Maadi: games/adjust_maadi.md
  - Flashcards:
      - English to Tamil: flashcards_en_tn.md
      - Tamil to English: flashcards_tn_en.md
