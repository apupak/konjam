<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meter Podu | KONJAM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="../../assets/img/favicon.png">
    <meta name="theme-color" content="#FFD700">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <meta name="description"
        content="Play Meter Podu — an interactive Tamil language game set in Chennai. Negotiate auto-rickshaw fares and navigate street scenarios in Tamil.">
    <link rel="alternate" hreflang="en" href="https://konjam.org/games/meter_podu/" />
    <link rel="alternate" hreflang="ta" href="https://konjam.org/games/meter_podu/" />
    <link rel="canonical" href="https://konjam.org/games/meter_podu/" />
    <meta property="og:title" content="Meter Podu | KONJAM">
    <meta property="og:description"
        content="An interactive Tamil language game. Negotiate auto-rickshaw fares, give directions, and survive Chennai street life — all in Tamil.">
    <meta property="og:url" content="https://konjam.org/games/meter_podu/">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "LearningResource",
        "name": "Meter Podu",
        "description": "An interactive game to practice spoken Chennai Tamil through real-life street scenarios.",
        "url": "https://konjam.org/games/meter_podu/",
        "inLanguage": "ta",
        "educationalLevel": "Beginner",
        "learningResourceType": "Game",
        "provider": {
            "@type": "Organization",
            "name": "KONJAM",
            "url": "https://konjam.org"
        }
    }
    </script>
</head>

<body>
    <div id="app">
        <div class="glass-container">
            <header>
                <div class="stats">
                    <div class="stat-item" id="respect-container">
                        <span class="label">RESPECT</span>
                        <div class="meter-bg">
                            <div id="respect-meter" class="meter-fill" style="width: 25%;"></div>
                        </div>
                        <span class="value" id="respect-rank">Tourist</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">WALLET</span>
                        <span class="value" id="wallet-value">₹500</span>
                    </div>
                    <div class="stat-item patience-container">
                        <span class="label">PATIENCE</span>
                        <div class="patience-bg">
                            <div id="patience-meter" class="patience-fill" style="width: 100%;"></div>
                        </div>
                    </div>
                </div>
            </header>

            <main id="game-scene">
                <!-- Level content will be injected here -->
                <div class="scene-intro">
                    <h1>Meter Podu 🛺</h1>
                    <p class="scenario-text">You are at T-Nagar area. Autos are waiting. Survive the
                        negotiation, earn respect, and make it across Chennai — all in Tamil.</p>
                    <button id="start-btn" class="primary-btn">Po! (Let's go)</button>
                </div>
            </main>

            <footer>
                <div id="game-controls">
                    <button id="restart-btn" class="control-btn secondary" onclick="location.reload()">&#8635;
                        Restart</button>
                </div>
                <div id="dialogue-box" class="hidden">
                    <p id="speaker-name"></p>
                    <p id="dialogue-text"></p>
                    <div id="choices-container"></div>
                </div>
            </footer>
        </div>
    </div>
    <script type="module" src="js/game.js"></script>
</body>

</html>
